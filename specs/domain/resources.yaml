# IRIS 자동 매칭 앱 - 도메인 리소스 정의
version: "1.0"

resources:
  company_profile:
    description: 기업 프로필 (사업자번호 기반)
    storage: notion_db
    fields:
      id: { type: string, required: true }
      business_number: { type: string, required: true, description: "사업자번호 10자리" }
      company_name: { type: string }
      ceo_name: { type: string }
      industry: { type: string }
      revenue: { type: number, description: "매출액(원)" }
      employee_count: { type: number }
      address: { type: string }
      research_fields: { type: "string[]", description: "연구분야 목록" }
      tech_keywords: { type: "string[]", description: "기술 키워드 목록" }
      created_at: { type: datetime }
      updated_at: { type: datetime }
    endpoints:
      - method: POST
        path: /api/v1/company/lookup
        description: 사업자번호로 기업 조회 (공공API 연동)
      - method: PUT
        path: /api/v1/company/profile
        description: 프로필 수정 (연구분야/키워드 추가)

  announcements:
    description: IRIS 공고 데이터 (스크래핑)
    storage: notion_db
    fields:
      id: { type: string, required: true }
      iris_id: { type: string, description: "IRIS 공고 고유번호" }
      title: { type: string, required: true }
      organization: { type: string, description: "공고기관" }
      field: { type: string, description: "분야" }
      deadline: { type: date }
      budget: { type: string, description: "지원규모" }
      status: { type: string, enum: [진행중, 마감] }
      detail_url: { type: string }
      content: { type: string, description: "공고 전문" }
      ai_summary: { type: string, description: "AI 요약" }
      attachments: { type: "object[]", description: "첨부파일 목록 [{name, url}]" }
      scraped_at: { type: datetime }
    endpoints:
      - method: GET
        path: /api/v1/announcements
        description: 공고 목록 조회 (필터 지원)
      - method: GET
        path: /api/v1/announcements/{id}
        description: 공고 상세 조회

  match_results:
    description: AI 매칭 분석 결과
    storage: notion_db
    fields:
      id: { type: string, required: true }
      company_id: { type: string, ref: company_profile }
      announcement_id: { type: string, ref: announcements }
      match_score: { type: number, description: "적합도 점수 0-100" }
      match_reason: { type: string, description: "매칭 근거 (LLM 분석)" }
      announcement_title: { type: string }
      announcement_org: { type: string }
      announcement_deadline: { type: date }
      report_url: { type: string, description: "보고서 PDF URL" }
      analyzed_at: { type: datetime }
    endpoints:
      - method: POST
        path: /api/v1/matching/analyze
        description: 매칭 분석 실행
      - method: GET
        path: /api/v1/matching/results
        description: 매칭 결과 목록
      - method: GET
        path: /api/v1/matching/results/{id}
        description: 매칭 결과 상세

  consult_requests:
    description: 전문가 상담 신청
    storage: notion_db
    fields:
      id: { type: string, required: true }
      company_id: { type: string, ref: company_profile }
      announcement_id: { type: string, ref: announcements }
      requester_name: { type: string, required: true }
      email: { type: string, required: true }
      phone: { type: string }
      message: { type: string }
      status: { type: string, enum: [접수, 진행중, 완료] }
      created_at: { type: datetime }
    endpoints:
      - method: POST
        path: /api/v1/consultation/submit
        description: 전문가 상담 신청 + 확인 이메일 발송

  reports:
    description: 생성된 보고서
    storage: notion_db
    fields:
      id: { type: string, required: true }
      match_result_id: { type: string, ref: match_results }
      announcement_title: { type: string }
      match_score: { type: number }
      pdf_url: { type: string }
      created_at: { type: datetime }
    endpoints:
      - method: GET
        path: /api/v1/reports
        description: 보고서 목록
      - method: GET
        path: /api/v1/reports/{id}/download
        description: 보고서 PDF 다운로드
