version: "2.0"

screen:
  name: 홈
  route: /
  layout: full-width
  auth: false

data_requirements:
  - resource: company_profile
    needs: [company_name]
  - resource: match_results
    needs: [id, match_score, announcement_title, announcement_deadline]
    filters: { sort: "-match_score", limit: 3 }
  - resource: announcements
    needs: [id, title, deadline]
    filters: { status: 진행중, sort: "deadline", limit: 3 }

components:
  - id: greeting_header
    type: text
    position: main
    function: "OO기업님, 오늘의 매칭 결과입니다" 인사 메시지
    data_source:
      resource: company_profile

  - id: match_summary_card
    type: stat-card
    position: main
    function: 적합 공고 수 요약 카드
    data_source:
      resource: match_results
    events:
      - on: click
        do: /matching 탭으로 이동

  - id: deadline_list
    type: list
    position: main
    function: 마감 임박 공고 상위 3개 표시 (D-day 뱃지)
    data_source:
      resource: announcements
    events:
      - on: click:item
        do: /matching/:id 공고 상세로 이동

  - id: top_matches
    type: list
    position: main
    function: 적합도 높은 매칭 결과 상위 3개
    data_source:
      resource: match_results
    events:
      - on: click:item
        do: /matching/:id 공고 상세로 이동
      - on: click:view_all
        do: /matching 탭으로 이동

connections:
  navigations:
    - from: deadline_list
      to: /matching/:id
    - from: top_matches
      to: /matching/:id
    - from: match_summary_card
      to: /matching

tests:
  - name: 홈 초기 로드
    when: 앱 시작 (프로필 등록 완료 후)
    then: [인사 메시지 표시, 적합 공고 수 표시, 마감 임박 3개, 상위 매칭 3개]
  - name: Pull to Refresh
    when: 아래로 당기기
    then: [IRIS 스크래핑 + 매칭 재분석, 데이터 갱신]
  - name: 공고 상세 이동
    when: 공고 카드 탭
    then: [/matching/:id로 이동]
